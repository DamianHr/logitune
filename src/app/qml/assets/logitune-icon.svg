  <rect x="99" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>

  <!-- Mouse shadow (matches mouse shape, offset down-right for depth) -->
  <path d="M87 42 C87 36 91 32 98 32 C105 32 110 36 110 42 L110 72 C110 80 105 84 98 84 C91 84 87 80 87 72 Z"
        fill="#000000" opacity="0.25"/>

  <!-- Mouse body (overlapping keyboard right side, bottom aligned) -->
  <path d="M84 38 C84 32 89 28 96 28 C103 28 108 32 108 38 L108 68 C108 76 103 80 96 80 C89 80 84 76 84 68 Z"
        fill="#333333" stroke="#444444" stroke-width="1.2"/>

  <!-- Mouse left/right divide -->
  <line x1="96" y1="28" x2="96" y2="48" stroke="#2a2a2a" stroke-width="0.8"/>

  <!-- Mouse scroll wheel -->
  <rect x="94" y="33" width="4" height="10" rx="2" fill="#00EAD0" opacity="0.7"/>
  <line x1="94.8" y1="35.5" x2="97.2" y2="35.5" stroke="#1a1a1a" stroke-width="0.4"/>
  <line x1="94.8" y1="37.5" x2="97.2" y2="37.5" stroke="#1a1a1a" stroke-width="0.4"/>
  <line x1="94.8" y1="39.5" x2="97.2" y2="39.5" stroke="#1a1a1a" stroke-width="0.4"/>
  <line x1="94.8" y1="41.5" x2="97.2" y2="41.5" stroke="#1a1a1a" stroke-width="0.4"/>

  <!-- Mouse side buttons -->
  <rect x="83" y="46" width="2" height="5" rx="0.6" fill="#444444"/>
  <rect x="83" y="53" width="2" height="5" rx="0.6" fill="#444444"/>

  <!-- Mouse body highlight -->
  <path d="M86 40 C86 34 89 30 96 30 C98 30 100 31 101 32 L101 44 C99 43 97 42 95 42 C92 42 89 41 86 40 Z"
        fill="#3d3d3d" opacity="0.4"/>

  <!-- Accent dot on mouse -->
  <circle cx="90" cy="48" r="1.5" fill="#00EAD0"/>

  <!-- Three connection dots at bottom -->
  <circle cx="50" cy="98" r="1.5" fill="#00EAD0" opacity="0.3"/>
  <circle cx="58" cy="98" r="1.8" fill="#00EAD0" opacity="0.6"/>
  <circle cx="66" cy="98" r="1.5" fill="#00EAD0" opacity="0.3"/>
</svg>

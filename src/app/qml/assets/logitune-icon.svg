<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark rounded background -->
  <rect width="128" height="128" rx="28" fill="#1a1a1a"/>

  <!-- Keyboard body (full width) -->
  <rect x="10" y="38" width="108" height="52" rx="5" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Keyboard key rows -->
  <!-- Row 1 (function keys) -->
  <rect x="15" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="23" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="31" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="39" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="47" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="55" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="63" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="71" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="79" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="87" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="95" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>
  <rect x="103" y="42" width="6" height="4" rx="0.8" fill="#3a3a3a"/>

  <!-- Row 2 -->
  <rect x="15" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="23" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="31" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="39" y="48" width="6" height="5" rx="0.8" fill="#00EAD0" opacity="0.5"/>
  <rect x="47" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="55" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="63" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="71" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="79" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="87" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="95" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="103" y="48" width="6" height="5" rx="0.8" fill="#3a3a3a"/>

  <!-- Row 3 -->
  <rect x="15" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="23" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="31" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="39" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="47" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="55" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="63" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="71" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="79" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="87" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="95" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="103" y="55" width="6" height="5" rx="0.8" fill="#3a3a3a"/>

  <!-- Row 4 -->
  <rect x="15" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="23" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="31" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="39" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="47" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="55" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="63" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="71" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="79" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="87" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="95" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="103" y="62" width="6" height="5" rx="0.8" fill="#3a3a3a"/>

  <!-- Spacebar row -->
  <rect x="15" y="69" width="12" height="5" rx="1" fill="#3a3a3a"/>
  <rect x="29" y="69" width="40" height="5" rx="1.5" fill="#3a3a3a"/>
  <rect x="71" y="69" width="12" height="5" rx="1" fill="#3a3a3a"/>
  <rect x="85" y="69" width="8" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="95" y="69" width="6" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="103" y="69" width="6" height="5" rx="0.8" fill="#3a3a3a"/>

  <!-- Row 6 (bottom modifiers) -->
  <rect x="15" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="27" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="39" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="51" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>
  <rect x="63" y="76" width="10" height="5" rx="0.8" fill="#3a3a3a"/>
